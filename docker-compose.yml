services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: score
      POSTGRES_PASSWORD: score
      POSTGRES_DB: score
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U score -d score"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  scheduler:
    image: curlimages/curl:8.11.1
    env_file:
      - .env
    depends_on:
      - app
    command:
      - sh
      - -c
      - |
        while true; do
          curl -fsS -X POST http://app:3000/api/cron/sync-matches -H "Authorization: Bearer $${CRON_SECRET}" || true
          curl -fsS -X POST http://app:3000/api/cron/calculate-scores -H "Authorization: Bearer $${CRON_SECRET}" || true
          sleep 60
        done
    restart: unless-stopped

volumes:
  postgres_data:
